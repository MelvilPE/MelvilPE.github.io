@if (init) {
  <div [formGroup]="formGroup" class="flex flex-col space-y-1 w-full">
    <div class="flex items-center space-x-1">
      <div
        class="w-8 h-8 rounded-md border border-[#3A4650] flex-shrink-0"
        [style.background-color]="colorPreview"
      ></div>
      <div class="flex flex-1 space-x-1">
        @for (propertyName of propertyNames; track $index) {
          <div class="flex flex-col items-center flex-1 min-w-0">
            <app-input-number
              [formGroup]="colorForm"
              [controlName]="propertyName"
              class="block w-full"
            ></app-input-number>
            <span class="text-[10px] text-[#7A8A94] mt-0.5">{{ propertyName }}</span>
          </div>
        }
      </div>
    </div>
  </div>
}
